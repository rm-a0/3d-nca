name: nca3d
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  # Core Python
  - python>=3.11,<3.12

  # PyTorch with CUDA support
  - pytorch>=2.0
  - pytorch-cuda=12.1
  - torchvision>=0.15

  # Core scientific computing
  - numpy>=1.24,<3.0
  - tqdm>=4.65

  # Visualization (optional)
  - matplotlib>=3.7
  - pip

  # Install package and remaining deps via pip
  - pip:
      - pyvista>=0.40
      - trimesh>=4.0
      - -e .
