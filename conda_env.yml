name: nca3d
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.11

  # PyTorch with CUDA support
  - pytorch>=2.0
  - pytorch-cuda=12.1
  - torchvision
  - torchaudio

  # Core dependencies
  - numpy>=1.24
  - tqdm>=4.65

  # Visualization
  - matplotlib>=3.7

  # Scripting utilities
  - pandas>=2.0

  # Jupyter ecosystem (for notebooks/)
  - jupyter
  - jupyterlab>=4.0
  - ipywidgets>=8.0

  # Development tools (conda versions for speed)
  - pytest>=8.0
  - pytest-cov>=5.0

  # pip for remaining packages
  - pip

  # Install via pip (not available or better via pip)
  - pip:
      - pyvista>=0.40      # 3D visualization
      - trimesh>=4.0       # mesh I/O
      - black>=24.0        # code formatting
      - isort>=5.12        # import sorting
      - mypy>=1.0          # type checking
      - ruff>=0.3          # linting
      - pre-commit>=3.5    # git hooks
      - wandb>=0.15        # experiment tracking (optional)
      - -e .               # install package in editable mode
